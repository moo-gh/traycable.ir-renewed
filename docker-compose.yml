services:
  traycable:
    build: .
    image: traycable-wordpress:php7.4-ioncube
    container_name: traycable_app
    volumes:
      - /var/www/traycable.ir:/var/www/html
    env_file:
      - /var/www/traycable.ir/.env
    ports:
      - 127.0.0.1:8120:80
    restart: unless-stopped
    networks:
      - traycable

  mysql:
    image: mysql:8.0.32
    container_name: traycable_mysql
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - /var/www/traycable.ir/.env
    volumes:
      - /var/www/traycable.ir/traycable_db_volume/:/var/lib/mysql
    restart: unless-stopped
    networks:
      - traycable

networks:
  traycable:
